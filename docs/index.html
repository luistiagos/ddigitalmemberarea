    <!-- GitHub Pages SPA: restaura a rota original após o redirect do 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          // Substitui o estado sem causar reload; o React Router lerá a URL correta
          var url = new URL(redirect);
          if (url.pathname !== '/') {
            window.history.replaceState(null, '', url.pathname + url.search + url.hash);
          }
        }
      })();
    </script>
